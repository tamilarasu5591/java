<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriVistara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1625246333195-098e4d975341?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-glass);
            color: var(--text-white);
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: var(--white);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-slate);
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 5px;
            color: var(--white);
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .form-group input.error {
            border-color: #D32F2F;
        }

        .form-group .field-error {
            color: #D32F2F;
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }

        .btn-full {
            width: 100%;
            margin-top: 10px;
        }

        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn.loading::after {
            content: '';
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .secondary-link {
            display: block;
            margin-top: 15px;
            color: var(--primary-color);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            animation: slide-in 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .toast.success {
            background: #2E7D32;
        }

        .toast.error {
            background: #D32F2F;
        }

        .toast.info {
            background: #0288D1;
        }

        @keyframes slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo" style="font-size: 2rem; color: var(--primary-color); font-weight: 700; margin-bottom: 20px;">
            AgriVistara</div>
        <h2 id="form-title">Welcome Back</h2>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="login-phone" placeholder="Enter phone number" required>
                <div class="field-error" id="login-phone-error">Please enter a valid phone number</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="login-password" placeholder="Enter password" required style="padding-right: 40px;">
                    <i class="fas fa-eye" onclick="togglePasswordVisibility('login-password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-slate);"></i>
                </div>
                <div class="field-error" id="login-password-error">Password is required</div>
            </div>
            <button class="btn btn-primary btn-full" id="btn-login" onclick="handleLogin()">Login</button>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0;">
                <div style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></div>
                <span style="color: var(--text-slate); font-size: 0.85rem; text-transform: uppercase; font-weight: 500;">or</span>
                <div style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></div>
            </div>
            <div id="google-btn-login" style="margin-bottom: 20px;"></div>
            <p class="secondary-link" onclick="toggleForm()">New user? Create an Account</p>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Your Name" required>
                <div class="field-error" id="reg-name-error">Name is required</div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <div class="field-error" id="reg-email-error">Enter a valid email address</div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="reg-phone" placeholder="Phone Number" required>
                <div class="field-error" id="reg-phone-error">Enter a valid 10-digit phone number</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="reg-password" placeholder="Create Password" required style="padding-right: 40px;">
                    <i class="fas fa-eye" onclick="togglePasswordVisibility('reg-password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-slate);"></i>
                </div>
                <div class="field-error" id="reg-password-error">Password must be at least 6 characters</div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="reg-confirm-password" placeholder="Confirm Password" required style="padding-right: 40px;">
                    <i class="fas fa-eye" onclick="togglePasswordVisibility('reg-confirm-password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-slate);"></i>
                </div>
                <div class="field-error" id="reg-confirm-password-error">Passwords do not match</div>
            </div>
            <button class="btn btn-primary btn-full" id="btn-register" onclick="handleRegister()">Register</button>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0;">
                <div style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></div>
                <span style="color: var(--text-slate); font-size: 0.85rem; text-transform: uppercase; font-weight: 500;">or</span>
                <div style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></div>
            </div>
            <div id="google-btn-register" style="margin-bottom: 20px;"></div>
            <p class="secondary-link" onclick="toggleForm()">Already have an account? Login</p>
        </div>
        <p id="msg" style="color: red; margin-top: 10px;"></p>
    </div>



    <script src="config.js"></script>
    <script>
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));
        }

        function showFieldError(inputId, errorId) {
            document.getElementById(inputId).classList.add('error');
            document.getElementById(errorId).style.display = 'block';
        }

        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const title = document.getElementById('form-title');

            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                title.innerText = 'Welcome Back';
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                title.innerText = 'Create Account';
            }
            document.getElementById('msg').innerText = '';
            clearErrors();
        }



        async function handleLogin() {
            clearErrors();
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-password').value;

            let valid = true;
            if (!phone) { showFieldError('login-phone', 'login-phone-error'); valid = false; }
            if (!pass) { showFieldError('login-password', 'login-password-error'); valid = false; }
            if (!valid) return;

            const btn = document.getElementById('btn-login');
            btn.classList.add('loading');
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    showToast('Login successful!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                } else {
                    showToast(data.message || 'Invalid credentials', 'error');
                }
            } catch (e) {
                showToast('Server Error', 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Login';
            }
        }



        async function handleRegister() {
            clearErrors();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-password').value;
            const confirmPass = document.getElementById('reg-confirm-password').value;

            let valid = true;
            if (!name) { showFieldError('reg-name', 'reg-name-error'); valid = false; }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('reg-email', 'reg-email-error'); valid = false; }
            if (!phone || phone.length < 10) { showFieldError('reg-phone', 'reg-phone-error'); valid = false; }
            if (!pass || pass.length < 6) { showFieldError('reg-password', 'reg-password-error'); valid = false; }
            if (pass !== confirmPass) { showFieldError('reg-confirm-password', 'reg-confirm-password-error'); valid = false; }

            if (!valid) return;

            const btn = document.getElementById('btn-register');
            btn.classList.add('loading');
            btn.textContent = 'Registering...';

            try {
                const res = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, password: pass, name: name, email: email })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    showToast('Registration Successful!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showToast(data.message || 'Registration failed', 'error');
                }
            } catch (e) {
                showToast('Server Error', 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Register';
            }
        }

        async function handleGoogleCredentialResponse(response) {
            try {
                const res = await fetch(`${API_BASE}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    showToast('Google Login Successful!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                } else {
                    showToast(data.message || 'Google Login failed', 'error');
                }
            } catch (e) {
                showToast('Server Error during Google Login', 'error');
            }
        }

        window.onload = function () {
            if (typeof google !== 'undefined' && typeof GOOGLE_CLIENT_ID !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("google-btn-login"),
                    { theme: "outline", size: "large", width: "300", shape: "pill" }
                );
                google.accounts.id.renderButton(
                    document.getElementById("google-btn-register"),
                    { theme: "outline", size: "large", width: "300", shape: "pill" }
                );
            } else {
                console.warn('Google Auth API failed to load or GOOGLE_CLIENT_ID is missing from config.js.');
            }
        };
    </script>
</body>

</html>
